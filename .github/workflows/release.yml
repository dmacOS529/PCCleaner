name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build self-contained
        run: >
          dotnet publish src/PCCleaner/PCCleaner.csproj
          -c Release -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/self-contained

      - name: Build lightweight
        run: >
          dotnet publish src/PCCleaner/PCCleaner.csproj
          -c Release -r win-x64
          --self-contained false
          -o publish/lightweight

      - name: Rename self-contained exe
        run: |
          Copy-Item publish/self-contained/PCCleaner.exe publish/PCCleaner-SelfContained.exe

      - name: Zip lightweight build
        run: |
          Compress-Archive -Path publish/lightweight/PCCleaner.exe,publish/lightweight/PCCleaner.dll,publish/lightweight/CommunityToolkit.Mvvm.dll,publish/lightweight/PCCleaner.deps.json,publish/lightweight/PCCleaner.runtimeconfig.json -DestinationPath publish/PCCleaner-Lightweight.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            publish/PCCleaner-SelfContained.exe
            publish/PCCleaner-Lightweight.zip
          generate_release_notes: true
